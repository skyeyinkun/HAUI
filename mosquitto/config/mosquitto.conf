# Mosquitto 安全配置
# 持久化存储
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log

# 监听 1883（仅用于内部网络；公网暴露请务必启用 TLS 8883）
listener 1883

# 禁止匿名访问：MQTT 必须通过用户名/密码认证
allow_anonymous false
password_file /mosquitto/config/passwd

# 可选：ACL 控制不同用户对主题的读写权限
# acl_file /mosquitto/config/acl

# 首次使用请在宿主机生成 passwd 文件：
#   docker exec -it mosquitto mosquitto_passwd -c /mosquitto/config/passwd <username>
# 后续追加用户：
#   docker exec -it mosquitto mosquitto_passwd /mosquitto/config/passwd <username>
