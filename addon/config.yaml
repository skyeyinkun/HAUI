name: "HAUI - 智能家庭中枢"
version: "3.12.0"
slug: "haui_dashboard"
description: "专为 Home Assistant 打造的高性能现代化前端控制面板，集成 AI 智能管家语音交互、全平台自适应界面与 iOS 风格组件体系。"
# 替换为你的 GitHub 用户名/仓库名
url: "https://github.com/skyeyinkun/HAUI"
startup: application
boot: auto
# 指定 ghcr.io 镜像，HA Supervisor 会拉取对应架构的镜像
# {arch} 会被 HA 自动替换为当前设备的架构（如 amd64、aarch64）
image: "ghcr.io/skyeyinkun/haui-{arch}"
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386
map:
  - config:rw
  - ssl:rw
options:
  AI_PROVIDER: "siliconflow"
  AI_API_KEY: ""
  AI_MODEL: "deepseek-ai/DeepSeek-V3"
  AI_BASE_URL: "https://api.siliconflow.cn/v1"
schema:
  AI_PROVIDER: str
  AI_API_KEY: str?
  AI_MODEL: str
  AI_BASE_URL: str
ingress: true
ingress_port: 8099
ingress_stream: true
panel_icon: mdi:view-dashboard
panel_title: "HAUI"
stage: stable
